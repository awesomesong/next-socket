app = 'socket-server-muddy-shadow-6983'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  # 🔴 중요: 소켓 서버는 요청이 없어도 켜져 있어야 합니다. "stop" 대신 false 사용.
  auto_stop_machines = false  
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpus = 1