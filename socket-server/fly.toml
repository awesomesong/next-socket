app = 'socket-server-muddy-shadow-6983'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = "3001"
  CLIENT_ORIGIN = "https://www.devsonghee.com,https://devsonghee.com,http://localhost:3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = '512mb'
  cpus = 1
